id: rfst_ula_adaptive_doa_ula
label: Adaptive Doa Ula
category: '[RFST_ULA]'

parameters:
  - id: mu
    label: Mu
    dtype: real
    default: '0.05'
  - id: eta
    label: Eta
    dtype: real
    default: '1e-5'
  - id: initial_theta
    label: Initial Theta
    dtype: real
    default: '0'

templates:
  imports: from gnuradio import rfst_ula
  make: rfst_ula.adaptive_doa_ula(mu=${mu}, eta=${eta}, initial_theta=${initial_theta})

inputs:
  - domain: stream
    dtype: complex
    multiplicity: 5

outputs:
  - domain: stream
    dtype: float
    id: theta
  - domain: stream
    dtype: complex
    vlen: 5
    id: G

file_format: 1