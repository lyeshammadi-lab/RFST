id: rfst_ula_adaptive_doa_ula
label: Adaptive DoA ULA (RFST)
category: '[RFST] Direction of Arrival'

templates:
    imports: import rfst_ula
    make: rfst_ula.adaptive_doa_ula(${mu}, ${eta}, ${initial_theta})
    callbacks:
    -   set_mu(${mu})
    -   set_eta(${eta})

parameters:
-   id: mu
    label: "Step size μ (steering)"
    dtype: float
    default: '0.05'
-   id: eta
    label: "Step size η (LMS)"
    dtype: float
    default: '1e-5'
-   id: initial_theta
    label: "Initial angle (deg)"
    dtype: float
    default: '0'

inputs:
-   domain: stream
    dtype: complex
    label: ant_0
-   domain: stream
    dtype: complex
    label: ant_1
-   domain: stream
    dtype: complex
    label: ant_2
-   domain: stream
    dtype: complex
    label: ant_3
-   domain: stream
    dtype: complex
    label: ant_4

outputs:
-   domain: stream
    dtype: float
    label: theta_deg
-   domain: stream
    dtype: complex
    vlen: 5
    label: steering_vec_G

file_format: 1